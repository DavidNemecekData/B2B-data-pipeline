version: 2

tests:
  - name: assert_deadline_before_distribution
    description: "Ensures no issue has a deadline date set logically after its physical distribution date."

  - name: assert_no_negative_revenue
    description: "Validates that the combination of discounts and provisions does not result in a negative final net price."

  - name: assert_pr_no_author
    description: "Checks business rules to ensure PR articles do not have an internal editorial author assigned."

  - name: assert_bonus_has_zero_price
    description: "Ensures that all bonus items in the sales performance fact table have a final net price of zero."

  - name: assert_positive_lead_time
    description: "Validates that the lead time between contact and recontact is always positive, ensuring logical consistency in contact history data."

  - name: assert_contact_before_deadline
    description: "Ensures that all contact events in the contact history fact table occur before the associated issue's deadline, maintaining temporal integrity in the sales funnel analysis."