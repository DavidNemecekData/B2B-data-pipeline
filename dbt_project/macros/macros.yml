version: 2

macros:
  - name: calculate_vat
    description: "Calculates the final price including Value Added Tax (VAT), rounded to two decimal places."
    arguments:
      - name: column_name
        type: string
        description: "The name of the column containing the net price."
      - name: vat_rate
        type: float
        description: "The VAT rate to apply (e.g., 0.21 for 21%)."