version: 2

models:
  - name: stg_company
    description: "Cleansed and standardized company data from the raw presentation source."
    columns:
      - name: company_id
        description: "Unique identifier for each company."
        tests:
          - not_null
          - unique
      - name: company_name
        description: "Name of the company."
      - name: contact_person_full_name
        description: "Name of the contact person for the company."
      - name: primary_email
        description: "Primary email address for the company."
      - name: secondary_email
        description: "Secondary email address for the company."
      - name: default_discount
        description: "Default discount percentage applied to the company."
      - name: is_personal_contact
        description: "Boolean flag indicating whether the contact is a personal contact (TRUE) or not (FALSE)."
        tests:
          - not_null
      - name: can_be_contacted
        description: "Boolean flag indicating whether the company can be contacted (TRUE) or not (FALSE)."
        tests:
          - not_null
      - name: is_active
        description: "Boolean flag indicating whether the company is active (TRUE) or inactive (FALSE)."
        tests:
          - not_null
      - name: note
        description: "Additional notes or comments about the company."

  - name: stg_company_specialization
    description: "Staging table linking companies to their specializations."
    columns:
      - name: company_id
        description: "Foreign key referencing the company."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_company')
                field: company_id
      - name: specialization_id
        description: "Foreign key referencing the specialization."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_specialization')
                field: specialization_id

  - name: stg_issue
    description: "Cleansed issue data with correctly formatted publication dates."
    columns:
      - name: issue_id
        description: "Unique identifier for each issue."
        tests:
          - not_null
          - unique
      - name: issue_year
        description: "Year of the issue's publication."
      - name: issue_month
        description: "Month of the issue's publication."
      - name: issue_date
        description: "Concatenated year and month as a date for easier filtering in reports."
        tests:
          - not_null
      - name: issue_label
        description: "Concatenated year and month as a text."
      - name: contain_special_part
        description: "Boolean flag indicating whether the issue contain a special part (TRUE) or not (FALSE)."
        tests:
          - not_null
      - name: deadline_date
        description: "Deadline date for the issue."
      - name: publication_date
        description: "Publication date of the issue."

  - name: dim_issue
    description: "Dimension table for issues for reporting and analysis."
    columns:
      - name: issue_id
        description: "Unique identifier for each issue."
        tests:
          - not_null
          - unique
      - name: issue_year
        description: "Year of the issue's publication."
      - name: issue_month
        description: "Month of the issue's publication."
      - name: issue_date
        description: "Concatenated year and month as a date for easier filtering in reports."
        tests:
          - not_null
      - name: issue_label
        description: "Concatenated year and month as a text."
      - name: contain_special_part
        description: "Boolean flag indicating whether the issue contain a special part (TRUE) or not (FALSE)."
        tests:
          - not_null
      - name: deadline_date
        description: "Deadline date for the issue."
      - name: publication_date
        description: "Publication date of the issue."

  - name: dim_calendar
    description: "Central time dimension generating a continuous date series for time intelligence and BI filtering."
    columns:
      - name: date_day
        description: "Unique identifier for each day."
        tests:
          - not_null
          - unique

  - name: fct_crm_funnel
    description: "Aggregated fact table tracking sales representatives' performance and conversion rates (Win Rate) per issue and specialization."
    columns:
      - name: issue_id
        description: "Foreign key referencing the issue."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_issue')
                field: issue_id
      - name: specialization_id
        description: "Unique identifier for each specialization."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialization')
                field: specialization_id
      - name: issue_date
        description: "Publication date of the issue."
      - name: total_contacts
        description: "Total number of contacts made for each issue and specialization."
      - name: accepted_contacts
        description: "Number of contacts that resulted in a positive response (ACCEPTED) for each issue and specialization."
      - name: rejected_contacts
        description: "Number of contacts that resulted in a negative response (REJECTED) for each issue and specialization."
      - name: no_response_contacts
        description: "Number of contacts that did not receive any response (NO_RESPONSE) for each issue and specialization."
      - name: in_progress_contacts
        description: "Number of contacts that are still in progress (CONTACTED, CONTACTED_AGAIN) for each issue and specialization."
      - name: win_rate
        description: "Calculated win rate as the ratio of successful contacts to total contacts for each issue and specialization."

  - name: dim_company_enriched
    description: "Enriched company dimension incorporating aggregated specialisations."
    columns:
      - name: company_id
        description: "Unique identifier for each company."
        tests:
          - not_null
          - unique
      - name: default_discount_pct
        description: "Default discount percentage applied to the company."
      - name: is_personal_contact
        description: "Boolean flag indicating whether the contact is a personal contact (TRUE) or not (FALSE)."
        tests:
          - not_null
      - name: can_be_contacted
        description: "Boolean flag indicating whether the company can be contacted (TRUE) or not (FALSE)."
        tests:
            - not_null
      - name: company_status
        description: "Active or inactive status of the company."
        tests:
            - accepted_values:
                arguments:
                  values: ['Active', 'Inactive']
      - name: specialization_list
        description: "Comma-separated list of specializations associated with the company."

  - name: stg_issue_section
    description: "Staging table for issue section data."
    columns:
      - name: issue_section_id
        description: "Unique identifier for each issue section."
        tests:
          - not_null
          - unique
      - name: section_name
        description: "Name of the issue section."

  - name: stg_issue_content
    description: "Staging table for issue content data."
    columns:
      - name: content_id
        description: "Unique identifier for each content item."
        tests:
          - not_null
          - unique
      - name: issue_id
        description: "Foreign key referencing the issue."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_issue')
                field: issue_id
      - name: issue_section_id
        description: "Foreign key referencing the issue section."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_issue_section')
                field: issue_section_id
      - name: company_id
        description: "Foreign key referencing the company."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_company_enriched')
                field: company_id
      - name: catalog_item_id
        description: "Foreign key referencing the catalog item."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_catalog_item')
                field: item_id
      - name: author_id
        description: "Foreign key referencing the author."
        tests:
          - relationships:
              arguments:
                to: ref('stg_ed_author')
                field: author_id
      - name: content_description
        description: "Description of the content item."
      - name: content_specialization_id
        description: "Foreign key referencing the specialization."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialization')
                field: specialization_id
      - name: posted_on_facebook
        description: "Boolean flag indicating whether the content was posted on Facebook (TRUE) or not (FALSE)."
        tests:
          - not_null
      - name: applied_list_price
        description: "List price applied to the content."
      - name: applied_discount_pct
        description: "Discount percentage applied to the content."
      - name: agency_provision_pct
        description: "Agency provision percentage applied to the content."
      - name: final_net_price
        description: "Final net price after discounts and provisions."

  - name: stg_ed_author
    description: "Staging table for author data."
    columns:
      - name: author_id
        description: "Unique identifier for each author."
        tests:
          - not_null
          - unique
      - name: author_name
        description: "Name of the author."

  - name: fct_sales_performance
    description: "Fact table capturing sales performance metrics."
    columns:
      - name: content_id
        description: "Unique identifier for each content item."
        tests:
          - not_null
          - unique
      - name: issue_id
        description: "Foreign key referencing the issue."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_issue')
                field: issue_id
      - name: issue_date
        description: "Publication date of the issue."
      - name: company_id
        description: "Foreign key referencing the company."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_company_enriched')
                field: company_id
      - name: catalog_item_id
        description: "Foreign key referencing the catalog item."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_catalog_item')
                field: catalog_item_id
      - name: page_ratio
        description: "Ratio of the one page occupied by the advertisement or article."
      - name: author_id
        description: "Foreign key referencing the author."
        tests:
          - relationships:
              arguments:
                to: ref('stg_ed_author')
                field: author_id
      - name: content_specialization_id
        description: "Foreign key referencing the specialization."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialization')
                field: specialization_id
      - name: applied_list_price
        description: "List price applied to the content."
      - name: applied_discount_pct
        description: "Discount percentage applied to the content."
      - name: agency_provision_pct
        description: "Agency provision percentage applied to the content."
      - name: final_net_price
        description: "Final net price after discounts and provisions."
        tests:
          - not_null
      - name: absolute_discount
        description: "Absolute discount amount applied to the content."
      - name: final_net_price_vat
        description: "Final net price including VAT."
      - name: contact_direction
        description: "Indicates whether the contact was inbound or outbound."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Inbound', 'Outbound']
      - name: sales_channel
        description: "Sales channel through which the contact was made (direct or agency)."
        tests:
          - accepted_values:
              arguments:
                values: ['Direct', 'Agency']

  - name: stg_contact_history
    description: "Staging table for contact history data."
    columns:
      - name: contact_id
        description: "Unique identifier for each contact."
        tests:
          - not_null
          - unique
      - name: company_id
        description: "Foreign key referencing the company."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_company_enriched')
                field: company_id
      - name: issue_id
        description: "Foreign key referencing the issue."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_issue')
                field: issue_id
      - name: specialization_id
        description: "Foreign key referencing the specialization."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialization')
                field: specialization_id
      - name: contact_date
        description: "Date when the contact was made."
      - name: recontact_date
        description: "Date when the contact was reattempted."
      - name: contact_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CONTACTED', 'CONTACTED_AGAIN', 'ACCEPTED', 'REJECTED', 'NO_RESPONSE']
      - name: contact_status_renamed
        description: "Renamed contact status for better readability in reports."
      - name: communication_note
        description: "Additional notes or comments about the contact."

  - name: stg_catalog_item
    description: "Staging table for catalog item data with renamed item category names."
    columns:
      - name: item_id
        description: "Unique identifier for each catalog item."
        tests:
          - not_null
          - unique
      - name: item_category_name
        description: "Translated item category names for better readability in reports."
        tests:
          - accepted_values:
              arguments:
                values: ['Advertisement', 'PR Article', 'Editorial Article']
      - name: type_name
        description: "Descriptive type name for the catalog item."
      - name: list_price
        description: "List price of the catalog item."
      - name: width_mm
        description: "Width of the catalog item in millimeters."
      - name: height_mm
        description: "Height of the catalog item in millimeters."
      - name: ratio
        description: "Ratio of the catalog item size to a standard page size."
      - name: has_bleed
        description: "Boolean flag indicating whether the catalog item has bleed (TRUE) or not (FALSE)."
      - name: is_bonus
        description: "Boolean flag indicating whether the catalog item is a bonus item (TRUE) or not (FALSE)."
        tests:
          - not_null

  - name: stg_category_field
    description: "Staging table for category field data with renamed field names."
    columns:
      - name: field_id
        description: "Unique identifier for each category field."
        tests:
          - not_null
          - unique
      - name: field_name
        description: "Translated category field names for better readability in reports."
        tests:
          - accepted_values:
              arguments:
                values: ['Animal Husbandry', 'Plant Production', 'Mechanization', 'Other']

  - name: dim_catalog_item
    description: "Dimension table for catalog items."
    columns:
      - name: catalog_item_id
        description: "Unique identifier for each catalog item."
        tests:
          - not_null
          - unique
      - name: item_category_name
        description: "Translated item category names for better readability in reports."
        tests:
          - accepted_values:
              arguments:
                values: ['Advertisement', 'PR Article', 'Editorial Article']
      - name: type_name
        description: "Descriptive type name for the catalog item."
      - name: catalog_list_price
        description: "List price of the catalog item."
      - name: width_mm
        description: "Width of the catalog item in millimeters."
      - name: height_mm
        description: "Height of the catalog item in millimeters."
      - name: has_bleed
        description: "Boolean flag indicating whether the catalog item has bleed (TRUE) or not (FALSE)."
      - name: bonus_status
        description: "Indicates whether the catalog item is a bonus item (Bonus) or a paid item (Paid)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Bonus', 'Paid']

  - name: stg_specialization
    description: "Staging table for specialization data with renamed specialization names."
    columns:
      - name: specialization_id
        description: "Unique identifier for each specialization."
        tests:
          - not_null
          - unique
      - name: specialization_name
        description: "Specialization names."
      - name: field_id
        description: "Foreign key referencing the category field."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_category_field')
                field: field_id

  - name: dim_specialization
    description: "Table of fields and specializations. It links specializations to their parent categories."
    columns:
      - name: specialization_id
        description: "Unique identifier for each specialization."
        tests:
          - unique
          - not_null
      - name: specialization_name
        description: "Specialization names."
      - name: field_id
        description: "Foreign key referencing the category field."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_category_field')
                field: field_id
      - name: field_name
        description: "Category field names for better readability in reports."
        tests:
          - accepted_values:
              arguments:
                values: ['Animal Husbandry', 'Plant Production', 'Mechanization', 'Other']

  - name: fct_contact_history
    description: "A detailed fact table of individual contacts with derived metrics for measuring sales representative performance and response times."
    columns:
      - name: contact_id
        description: "Unique identifier for each contact."
        tests:
          - unique
          - not_null
      - name: company_id
        description: "Foreign key for the contacted company."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_company_enriched')
                field: company_id
      - name: issue_id
        description: "Foreign key for the issue associated with the contact."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_issue')
                field: issue_id
      - name: specialization_id
        description: "Foreign key for the specialization associated with the contact."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialization')
                field: specialization_id
      - name: contact_date
        description: "Date when the contact was made."
      - name: recontact_date
        description: "Date when the contact was reattempted."
      - name: lead_time_days
        description: "Number of days between the contact date and the recontact date."
      - name: issue_date
        description: "Monthly publication date of the issue associated with the contact."
      - name: days_before_deadline
        description: "Number of days between the contact date and the issue's deadline date."
      - name: is_win_flag
        description: "Binary flag for success one (1) or failure zero (0)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: contact_status
        description: "Renamed contact status for better readability in reports."
      - name: communication_note
        description: "Additional notes or comments about the contact."